<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>数据统计</title><link rel="stylesheet" href="/static/css/style.css"></head>
<body>
<button class="mobile-toggle" id="mobileToggle">☰</button><div class="sidebar-overlay" id="sidebarOverlay"></div>
<aside class="sidebar" id="sidebar"><div class="sidebar-brand"><h2>值日排班管理</h2><p>后台管理系统</p></div><nav class="sidebar-nav"><a href="/admin"><span class="nav-icon">🏠</span> 首页</a><a href="/admin/semesters"><span class="nav-icon">📅</span> 学期管理</a><a href="/admin/classes"><span class="nav-icon">🏫</span> 班级管理</a><a href="/admin/schedule"><span class="nav-icon">📝</span> 排班管理</a><a href="/admin/holidays"><span class="nav-icon">🎌</span> 节假日管理</a><a href="/admin/stats" class="active"><span class="nav-icon">📊</span> 数据统计</a></nav></aside>
<main class="main-content">
  <div class="page-header"><h2>数据统计</h2><a href="/" class="btn btn-outline btn-sm">学生入口</a></div>
  <div class="card"><div class="card-header">选择班级</div><div class="card-body"><div class="form-group"><select id="clsSel" class="form-control" onchange="load()"></select></div></div></div>
  <div id="area" class="hidden">
    <div class="stat-cards" id="overview"></div>
    <div class="card"><div class="card-header">每人值日次数</div><div class="card-body"><div id="chart"></div></div></div>
    <div class="card"><div class="card-header">均衡度一览</div><div class="card-body"><div id="cards"></div></div></div>
  </div>
</main>
<div class="modal-overlay" id="modal"><div class="modal-box"><div class="modal-header" id="mTitle">详情</div><div class="table-wrap"><table><thead><tr><th>日期</th><th>职责</th><th>状态</th></tr></thead><tbody id="mBody"></tbody></table></div><div style="margin-top:16px;text-align:right"><button class="btn btn-outline" onclick="document.getElementById('modal').classList.remove('show')">关闭</button></div></div></div>
<div id="toastContainer" class="toast-container"></div>
<script src="/static/js/admin.js"></script>
<script>
var students=[];
document.addEventListener('DOMContentLoaded',function(){api.get('/admin/classes').then(function(d){var s=document.getElementById('clsSel');s.innerHTML=(d||[]).map(function(c){return '<option value="'+c.id+'">'+escapeHtml(c.name)+'</option>';}).join('');if(d&&d.length)load();});});
function load(){var cid=document.getElementById('clsSel').value;if(!cid)return;api.get('/admin/stats/class/'+cid).then(function(d){document.getElementById('area').classList.remove('hidden');students=d.student_stats||[];var ga=(d.group_a_balance*100).toFixed(0),gb=(d.group_b_balance*100).toFixed(0);document.getElementById('overview').innerHTML='<div class="stat-card"><div class="stat-value">'+d.total_schedule+'</div><div class="stat-label">总排班</div></div><div class="stat-card"><div class="stat-value">'+students.length+'</div><div class="stat-label">学生数</div></div><div class="stat-card"><div class="stat-value">'+ga+'%</div><div class="stat-label">上半学期均衡</div><div class="balance-bar"><div class="balance-fill" style="width:'+ga+'%;background:var(--blue)"></div></div></div><div class="stat-card"><div class="stat-value">'+gb+'%</div><div class="stat-label">下半学期均衡</div><div class="balance-bar"><div class="balance-fill" style="width:'+gb+'%;background:var(--green)"></div></div></div>';renderChart(students);renderCards(students);});}
function renderChart(list){var s=list.slice().sort(function(a,b){return b.duty_count-a.duty_count;});var mx=Math.max.apply(null,s.map(function(x){return x.duty_count;}))||1;var h='<div class="bar-chart">';s.forEach(function(x){var p=(x.duty_count/mx)*100;var c=x.group_name==='A'?'a-group':'b-group';h+='<div class="bar-row"><span class="bar-label">'+escapeHtml(x.name)+'</span><div class="bar-wrapper"><div class="bar-fill '+c+'" style="width:'+Math.max(p,6)+'%">'+x.duty_count+'</div></div></div>';});h+='</div>';document.getElementById('chart').innerHTML=h;}
function renderCards(list){var ga=list.filter(function(s){return s.group_name==='A';}),gb=list.filter(function(s){return s.group_name==='B';});var h='';if(ga.length){h+='<div class="group-title">📗 上半学期</div><div class="student-grid">';ga.forEach(function(s){h+='<div class="student-card a-card" onclick="detail('+s.id+')"><div class="s-name">'+escapeHtml(s.name)+'</div><div class="s-count">'+s.duty_count+'</div><div class="s-label">次</div></div>';});h+='</div>';}if(gb.length){h+='<div class="group-title">📘 下半学期</div><div class="student-grid">';gb.forEach(function(s){h+='<div class="student-card b-card" onclick="detail('+s.id+')"><div class="s-name">'+escapeHtml(s.name)+'</div><div class="s-count">'+s.duty_count+'</div><div class="s-label">次</div></div>';});h+='</div>';}document.getElementById('cards').innerHTML=h;}
function detail(sid){api.get('/admin/stats/student/'+sid).then(function(d){document.getElementById('mTitle').textContent=d.student.name+' — 详细记录';var tb=document.getElementById('mBody');if(!d.records||!d.records.length){tb.innerHTML='<tr><td colspan="3"><div class="empty-state">暂无记录</div></td></tr>';}else{var id=d.student.id;tb.innerHTML=d.records.map(function(r){var dt=r.student1_id===id?r.duty1_type:r.duty2_type;var st=r.status==='completed'?'status-completed':'status-pending';var sv=r.status==='completed'?'已完成':'待完成';return '<tr><td>'+r.date+'</td><td>'+(dt||'-')+'</td><td><span class="status-badge '+st+'">'+sv+'</span></td></tr>';}).join('');}document.getElementById('modal').classList.add('show');});}
</script></body></html>
