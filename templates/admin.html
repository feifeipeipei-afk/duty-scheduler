<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>老师工作台 — 值日排班系统</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <button class="mobile-toggle" id="mobileToggle">☰</button>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><h2>值日排班管理</h2><p>老师工作台</p></div>
    <nav class="sidebar-nav">
      <a href="/admin" class="active"><span class="nav-icon">🏠</span> 工作台</a>
      <a href="/admin/schedule"><span class="nav-icon">📝</span> 排班</a>
      <a href="/admin/classes"><span class="nav-icon">🏫</span> 班级学生</a>
      <a href="/admin/holidays"><span class="nav-icon">🎌</span> 假期设置</a>
      <a href="/admin/stats"><span class="nav-icon">📊</span> 记录与统计</a>
      <a href="/admin/semesters"><span class="nav-icon">⚙️</span> 学期设置</a>
    </nav>
  </aside>
  <main class="main-content page-enter">
    <div class="page-header">
      <div>
        <h2>老师工作台</h2>
        <p class="page-subtitle">先检查问题，再生成、打印和值日确认。</p>
      </div>
      <a href="/" class="btn btn-outline btn-sm">学生入口</a>
    </div>

    <div class="stat-cards">
      <div class="stat-card">
        <div class="stat-value" id="c1">-</div>
        <div class="stat-label">班级数量</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="c2">-</div>
        <div class="stat-label">学生总数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="c3">-</div>
        <div class="stat-label">本月排班</div>
      </div>
      <div class="stat-card" onclick="location.href='/admin/schedule#health'" style="cursor:pointer">
        <div class="stat-value" id="c4">-</div>
        <div class="stat-label">待处理问题</div>
      </div>
    </div>

    <div class="quick-actions">
      <button class="action-tile" onclick="location.href='/admin/schedule?action=generate'">
        <span class="action-icon">📝</span>
        <strong>生成本月排班</strong>
        <small>预览确认后发布</small>
      </button>
      <button class="action-tile" onclick="location.href='/admin/classes?action=import'">
        <span class="action-icon">⬆️</span>
        <strong>导入学生名单</strong>
        <small>支持 Excel / CSV</small>
      </button>
      <button class="action-tile" onclick="location.href='/admin/schedule?action=print'">
        <span class="action-icon">🖨️</span>
        <strong>打印/导出排班</strong>
        <small>适合张贴和留档</small>
      </button>
      <button class="action-tile" onclick="location.href='/admin/schedule#health'">
        <span class="action-icon">✅</span>
        <strong>检查问题</strong>
        <small>生成前自动体检</small>
      </button>
    </div>

    <div class="card">
      <div class="card-header">今天要关注</div>
      <div class="card-body" id="todayPanel">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </main>
  <div id="toastContainer" class="toast-container"></div>
  <script src="/static/js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      Promise.all([
        api.get('/admin/stats/quick').catch(function(){ return {}; }),
        api.get('/admin/health').catch(function(){ return {summary:{total:0}, issues:[]}; })
      ]).then(function(res) {
        var stats = res[0] || {};
        var health = res[1] || {summary:{total:0}, issues:[]};
        document.getElementById('c1').textContent = stats.class_count || 0;
        document.getElementById('c2').textContent = stats.student_count || 0;
        document.getElementById('c3').textContent = stats.schedule_count || 0;
        document.getElementById('c4').textContent = (health.summary && health.summary.total) || 0;
        renderToday(health.issues || []);
      });
    });

    function renderToday(issues) {
      var panel = document.getElementById('todayPanel');
      if (!issues.length) {
        panel.innerHTML = '<div class="teacher-note success">当前没有发现必须处理的问题，可以直接去生成或打印排班。</div>';
        return;
      }
      panel.innerHTML = '<div class="issue-list">' + issues.slice(0, 5).map(function(i) {
        var cls = i.level === 'block' ? 'danger' : 'warn';
        return '<a class="issue-row '+cls+'" href="'+(i.target || '/admin/schedule')+'"><span>'+(i.level === 'block' ? '需处理' : '提醒')+'</span><strong>'+escapeHtml(i.message)+'</strong></a>';
      }).join('') + '</div>';
    }
  </script>
</body>
</html>
