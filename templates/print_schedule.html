<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>打印排班表</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body { background:#fff; color:#191919; }
    .print-page { max-width: 900px; margin: 0 auto; padding: 28px; }
    .print-header { display:flex; justify-content:space-between; align-items:flex-end; border-bottom:2px solid #191919; padding-bottom:14px; margin-bottom:18px; }
    .print-header h1 { font-size:1.5rem; font-weight:700; }
    .print-meta { color:#666; font-size:0.9rem; }
    .print-actions { margin-bottom:16px; display:flex; gap:8px; }
    .print-table th, .print-table td { border:1px solid #222; padding:10px 12px; color:#111; }
    .print-table th { background:#f2f2f2; font-weight:700; }
    @media print {
      .print-actions { display:none; }
      .print-page { padding:0; max-width:none; }
      @page { size:A4; margin:14mm; }
    }
  </style>
</head>
<body>
  <main class="print-page">
    <div class="print-actions"><button class="btn btn-primary" onclick="window.print()">打印</button><button class="btn btn-outline" onclick="window.close()">关闭</button></div>
    <div class="print-header">
      <h1 id="title">值日排班表</h1>
      <div class="print-meta" id="meta"></div>
    </div>
    <table class="print-table">
      <thead><tr><th>日期</th><th>星期</th><th>学生1</th><th>职责1</th><th>学生2</th><th>职责2</th><th>状态</th></tr></thead>
      <tbody id="body"><tr><td colspan="7">加载中...</td></tr></tbody>
    </table>
  </main>
  <script>
    var params = new URLSearchParams(location.search);
    var classId = params.get('class_id');
    var month = params.get('month');
    var weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
    function escapeHtml(str) {
      if (!str) return '';
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
    if (!classId || !month) {
      document.getElementById('body').innerHTML = '<tr><td colspan="7">缺少班级或月份，请从排班页重新打开打印。</td></tr>';
    } else {
      fetch('/admin/classes?format=json').then(function(r){return r.json();}).then(function(classes){
        var cls = (classes || []).find(function(c){ return String(c.id) === String(classId); });
        document.getElementById('title').textContent = (cls ? cls.name : '') + ' 值日排班表';
        document.getElementById('meta').textContent = month || '';
      });
      fetch('/admin/schedule/list?format=json&class_id=' + encodeURIComponent(classId) + '&month=' + encodeURIComponent(month)).then(function(r){return r.json();}).then(function(rows){
        var body = document.getElementById('body');
        if (!rows || !rows.length) { body.innerHTML = '<tr><td colspan="7">暂无排班</td></tr>'; return; }
        body.innerHTML = rows.map(function(r){
          var d = new Date(r.date + 'T00:00:00');
          return '<tr><td>'+escapeHtml(r.date)+'</td><td>'+weekdays[d.getDay()]+'</td><td>'+escapeHtml(r.student1_name||'')+'</td><td>'+escapeHtml(r.duty1_type||'')+'</td><td>'+escapeHtml(r.student2_name||'')+'</td><td>'+escapeHtml(r.duty2_type||'')+'</td><td>'+(r.status === 'completed' ? '已完成' : '待完成')+'</td></tr>';
        }).join('');
      }).catch(function(){
        document.getElementById('body').innerHTML = '<tr><td colspan="7">加载失败，请回到排班页重新打开。</td></tr>';
      });
    }
  </script>
</body>
</html>
